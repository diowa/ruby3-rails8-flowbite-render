databases:
  - name: ruby3-rails8-flowbite-render-db
    plan: free
    user: ruby3_rails8_flowbite_render
    databaseName: ruby3_rails8_flowbite_render_production

services:
  - name: ruby3-rails8-flowbite-render-app
    plan: free
    type: web
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    # preDeployCommand: "bundle exec rails db:migrate" # preDeployCommand only available on paid instance types
    startCommand: "bundle exec rails server"
    healthCheckPath: /up
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ruby3-rails8-flowbite-render-db
          property: connectionString
      - key: RUBY3_RAILS8_FLOWBITE_RENDER_DATABASE_PASSWORD
        fromDatabase:
          name: ruby3-rails8-flowbite-render-db
          property: password
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2 # sensible default
